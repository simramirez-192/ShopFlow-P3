server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms-autenticacion
          uri: http://localhost:8080
          predicates:
            - Path=/api/autenticacion/**

        - id: ms-usuario
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**

        - id: ms-producto
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**,/api/categorias/**

        - id: ms-inventario
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventario/**

        - id: ms-carrito
          uri: http://localhost:8084
          predicates:
            - Path=/api/carrito/**

        - id: ms-orden
          uri: http://localhost:8085
          predicates:
            - Path=/api/ordenes/**

        - id: ms-pago
          uri: http://localhost:8086
          predicates:
            - Path=/api/pagos/**

        - id: ms-envio
          uri: http://localhost:8087
          predicates:
            - Path=/api/envios/**

        - id: ms-notificacion
          uri: http://localhost:8088
          predicates:
            - Path=/api/notificaciones/**

        - id: ms-resena
          uri: http://localhost:8089
          predicates:
            - Path=/api/resenas/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
