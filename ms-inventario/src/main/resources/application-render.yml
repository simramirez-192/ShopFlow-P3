server:
  port: ${PORT:8083}

spring:
  application:
    name: ms-inventario
  datasource:
    url: jdbc:mysql://mysql-118572f5-duocuc-89e6.e.aivencloud.com:20978/shopflow_inventario?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    service-url:
      defaultZone: https://shopflow-eureka-p3.onrender.com/eureka/
  instance:
    prefer-ip-address: true

ms:
  producto:
    url: https://shopflow-ms-producto.onrender.com

logging:
  level:
    com.shopflow: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
